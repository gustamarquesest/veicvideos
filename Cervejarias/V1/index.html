<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEIC Vídeos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0d0d0d;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:#111;
}

.hero-content h1{
font-size:60px;
margin-bottom:20px;
}

.hero-content p{
font-size:22px;
opacity:.8;
}

.section{
padding:80px 20px;
max-width:1200px;
margin:auto;
}

.section-title{
font-size:42px;
margin-bottom:30px;
text-align:center;
}

.description{
text-align:center;
max-width:800px;
margin:auto;
line-height:1.7;
opacity:.8;
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:50px;
}

.video-card{
background:#1a1a1a;
border-radius:20px;
overflow:hidden;
}

.video-card iframe{
width:100%;
aspect-ratio:16/9;
border:none;
}

.video-info{
padding:20px;
}

.cta{
text-align:center;
padding:100px 20px;
}

.cta a{
display:inline-block;
margin-top:30px;
padding:18px 40px;
background:white;
color:black;
text-decoration:none;
border-radius:100px;
font-weight:bold;
}

.footer{
text-align:center;
padding:40px;
opacity:.5;
}

@media(max-width:768px){

.hero-content h1{
font-size:42px;
}

.hero-content p{
font-size:18px;
}

.section-title{
font-size:32px;
}

}

</style>
</head>

<body>

<section class="hero">
<div class="hero-content">
<h1>VEIC Vídeos</h1>
<p>Posicionamento através de vídeos estratégicos.</p>
</div>
</section>

<section class="section">

<h2 class="section-title">
Produções
</h2>

<p class="description">
Vídeos cinematográficos para fortalecer marcas e experiências.
</p>

<div class="video-grid">

<div class="video-card">
<iframe src="https://www.youtube.com/embed/VIDEO1"></iframe>
<div class="video-info">
<h3>Produção 1</h3>
</div>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/VIDEO2"></iframe>
<div class="video-info">
<h3>Produção 2</h3>
</div>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/VIDEO3"></iframe>
<div class="video-info">
<h3>Produção 3</h3>
</div>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/VIDEO4"></iframe>
<div class="video-info">
<h3>Produção 4</h3>
</div>
</div>

</div>

</section>

<section class="cta">

<h2 class="section-title">
Vamos posicionar sua marca?
</h2>

<a href="https://wa.me/5531999999999">
Falar no WhatsApp
</a>

</section>

<div class="footer">
VEIC Vídeos
</div>

</body>
</html>
