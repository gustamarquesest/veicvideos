<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veic Vídeos – Jornada</title>
  <style>
    /* ─── TOKENS ─────────────────────────────────────────────── */
    :root {
      --bg:        #1a1508;
      --surface:   #231c0a;
      --card:      #2b2109;
      --card-act:  #3d2f0b;
      --gold:      #e8a020;
      --gold-dim:  #7a5510;
      --gold-faint:#3d2c08;
      --text:      #f0e8d6;
      --muted:     #8a7a60;
      --border:    #3a2e10;
      --radius:    14px;
      --track-h:   220px;    /* height of carousel track on mobile */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ─── SECTION WRAPPER ────────────────────────────────────── */
    .journey-section {
      padding: 48px 0 64px;
    }

    .journey-header {
      text-align: center;
      padding: 0 24px 32px;
    }
    .journey-header h2 {
      font-size: clamp(13px, 3.5vw, 15px);
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--gold);
      text-transform: uppercase;
      line-height: 1.5;
    }

    /* ══════════════════════════════════════════════════════════
       DESKTOP – horizontal single row (unchanged)
    ══════════════════════════════════════════════════════════ */
    .desktop-track {
      display: none;
    }

    @media (min-width: 768px) {
      .desktop-track {
        display: flex;
        gap: 0;
        padding: 0 32px;
      }
      .mobile-carousel-wrapper { display: none !important; }

      .d-step {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 28px 16px 24px;
        background: var(--card);
        border: 1px solid var(--border);
        cursor: pointer;
        transition: background .2s, border-color .2s;
        position: relative;
      }
      .d-step:first-child { border-radius: var(--radius) 0 0 var(--radius); }
      .d-step:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
      .d-step + .d-step   { border-left: none; }

      .d-step.active,
      .d-step:hover { background: var(--card-act); border-color: var(--gold-dim); }
      .d-step.active::after {
        content: '';
        position: absolute;
        bottom: 0; left: 10%; right: 10%;
        height: 3px;
        background: var(--gold);
        border-radius: 2px;
      }

      .d-step .step-num {
        font-size: 11px; font-weight: 700; letter-spacing: .1em;
        color: var(--gold-dim);
        margin-bottom: 10px;
      }
      .d-step.active .step-num { color: var(--gold); }

      .d-step .step-icon {
        width: 42px; height: 42px;
        border-radius: 10px;
        background: var(--gold-faint);
        border: 1px solid var(--gold-dim);
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 12px;
        font-size: 18px;
        transition: background .2s, border-color .2s;
      }
      .d-step.active .step-icon {
        background: var(--gold-dim);
        border-color: var(--gold);
      }

      .d-step .step-title {
        font-size: 11px; font-weight: 800; letter-spacing: .1em;
        text-transform: uppercase;
        color: var(--text);
        margin-bottom: 6px;
      }
      .d-step .step-desc {
        font-size: 11px; line-height: 1.5;
        color: var(--muted);
      }

      /* desktop content panel */
      .journey-content {
        margin: 28px 32px 0;
        padding: 28px 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
    }

    /* ══════════════════════════════════════════════════════════
       MOBILE – CAROUSEL
    ══════════════════════════════════════════════════════════ */
    .mobile-carousel-wrapper {
      position: relative;
      overflow: hidden;
      /* fade edges */
      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0%,
        black 18%,
        black 82%,
        transparent 100%
      );
      mask-image: linear-gradient(
        to right,
        transparent 0%,
        black 18%,
        black 82%,
        transparent 100%
      );
    }

    .mobile-track {
      display: flex;
      gap: 12px;
      padding: 12px 50vw;          /* large side padding so first card centers */
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
      transition: scroll-behavior .3s;
    }
    .mobile-track::-webkit-scrollbar { display: none; }
    .mobile-track.is-dragging { cursor: grabbing; scroll-behavior: auto; }

    /* ── individual step card ── */
    .m-step {
      flex: 0 0 160px;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 22px 14px 18px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition:
        background .3s cubic-bezier(.4,0,.2,1),
        border-color .3s,
        transform .3s cubic-bezier(.4,0,.2,1),
        box-shadow .3s;
      position: relative;
      will-change: transform;
      touch-action: pan-x;
    }

    .m-step.active {
      background: var(--card-act);
      border-color: var(--gold);
      transform: scale(1.06);
      box-shadow:
        0 0 0 1px var(--gold),
        0 8px 28px rgba(232,160,32,.18),
        0 2px 8px rgba(0,0,0,.4);
      z-index: 2;
    }

    /* bottom bar on active */
    .m-step.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 14%; right: 14%;
      height: 3px;
      background: var(--gold);
      border-radius: 2px 2px 0 0;
    }

    .m-step .step-num {
      font-size: 10px; font-weight: 700; letter-spacing: .12em;
      color: var(--gold-dim);
      margin-bottom: 10px;
    }
    .m-step.active .step-num { color: var(--gold); }

    .m-step .step-icon {
      width: 44px; height: 44px;
      border-radius: 11px;
      background: var(--gold-faint);
      border: 1.5px solid var(--gold-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      margin-bottom: 12px;
      transition: background .3s, border-color .3s;
    }
    .m-step.active .step-icon {
      background: rgba(232,160,32,.18);
      border-color: var(--gold);
    }

    .m-step .step-title {
      font-size: 10.5px; font-weight: 800; letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1.3;
    }

    /* ── progress dots ── */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 18px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-faint);
      border: 1px solid var(--gold-dim);
      transition: background .3s, transform .3s, width .3s;
    }
    .dot.active {
      background: var(--gold);
      width: 18px;
      border-radius: 3px;
      border-color: var(--gold);
    }

    /* ── mobile content panel ── */
    .mobile-content {
      margin: 24px 16px 0;
      padding: 24px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      /* slide-in animation */
      animation: slideUp .35s cubic-bezier(.4,0,.2,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .content-label {
      font-size: 10px; font-weight: 700; letter-spacing: .14em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .content-title {
      font-size: 20px; font-weight: 800; letter-spacing: -.01em;
      color: var(--text);
      margin-bottom: 10px;
    }
    .content-desc {
      font-size: 14px; line-height: 1.65;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .content-tags {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .tag {
      font-size: 11px; font-weight: 600; letter-spacing: .06em;
      color: var(--gold);
      background: var(--gold-faint);
      border: 1px solid var(--gold-dim);
      border-radius: 20px;
      padding: 4px 12px;
    }

    /* ── step counter badge ── */
    .step-counter {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
    }
    .step-counter .sc-num {
      font-size: 13px; font-weight: 800; color: var(--gold);
    }
    .step-counter .sc-sep { color: var(--gold-dim); font-size: 12px; }
    .step-counter .sc-total { font-size: 12px; color: var(--muted); }

    /* hide desktop on mobile */
    @media (max-width: 767px) {
      .desktop-track,
      .journey-content { display: none !important; }
    }
  </style>
</head>
<body>

<section class="journey-section">

  <div class="journey-header">
    <h2>Selecione uma etapa para entender que<br>tipo de vídeo faz sentido</h2>
  </div>

  <!-- ══ DESKTOP LAYOUT (unchanged) ══ -->
  <div class="desktop-track" id="desktopTrack"></div>
  <div class="journey-content" id="desktopContent"></div>

  <!-- ══ MOBILE CAROUSEL ══ -->
  <div class="mobile-carousel-wrapper">
    <div class="mobile-track" id="mobileTrack"></div>
  </div>

  <div class="carousel-dots" id="carouselDots"></div>

  <div id="mobileContent"></div>

</section>

<script>
/* ─── DATA ──────────────────────────────────────────────────── */
const steps = [
  {
    num: '01',
    icon: '👁',
    title: 'Descoberta',
    desc: 'Aparecer para quem ainda não te conhece',
    objective: 'Fazer sua empresa aparecer para quem ainda não a conhece, expandindo alcance e gerando reconhecimento de marca.',
    types: ['Vídeo de topo de funil', 'Reels de alcance', 'Conteúdo orgânico', 'Anúncios de branding'],
  },
  {
    num: '02',
    icon: '🪟',
    title: 'Apresentação',
    desc: 'Explicar quem é sua empresa e o que faz',
    objective: 'Apresentar sua empresa de forma clara e envolvente para quem acabou de descobrí-la, gerando interesse e credibilidade.',
    types: ['Vídeo institucional', 'Manifesto de marca', 'Sobre nós', 'Tour pela empresa'],
  },
  {
    num: '03',
    icon: '📍',
    title: 'Consideração',
    desc: 'Gerar confiança e reduzir objeções',
    objective: 'Aprofundar o relacionamento com leads que já conhecem sua empresa, eliminando dúvidas e construindo autoridade.',
    types: ['Cases de sucesso', 'Depoimentos', 'Bastidores', 'Conteúdo educativo'],
  },
  {
    num: '04',
    icon: '🏷',
    title: 'Conversão',
    desc: 'Facilitar a decisão de compra',
    objective: 'Levar o lead qualificado à ação — compra, contato ou agendamento — com argumentos visuais irresistíveis.',
    types: ['Demonstração de produto', 'Oferta em vídeo', 'Prova social', 'CTA direto'],
  },
  {
    num: '05',
    icon: '👥',
    title: 'Fidelização',
    desc: 'Encantar e reter clientes existentes',
    objective: 'Manter clientes engajados, aumentar o LTV e transformá-los em promotores espontâneos da sua marca.',
    types: ['Onboarding em vídeo', 'Tutoriais', 'Novidades exclusivas', 'Programas de fidelidade'],
  },
  {
    num: '06',
    icon: '💼',
    title: 'Cultura Interna',
    desc: 'Comunicar para equipes e colaboradores',
    objective: 'Alinhar times, engajar talentos e comunicar valores internos de forma clara, humana e memorável.',
    types: ['Onboarding de equipe', 'Comunicados internos', 'Treinamentos', 'Cultura e valores'],
  },
];

let activeIdx = 0;

/* ─── DESKTOP BUILD ─────────────────────────────────────────── */
const desktopTrack   = document.getElementById('desktopTrack');
const desktopContent = document.getElementById('desktopContent');

function buildDesktop() {
  desktopTrack.innerHTML = steps.map((s, i) => `
    <div class="d-step ${i === activeIdx ? 'active' : ''}" data-i="${i}">
      <div class="step-num">${s.num}</div>
      <div class="step-icon">${s.icon}</div>
      <div class="step-title">${s.title}</div>
      <div class="step-desc">${s.desc}</div>
    </div>
  `).join('');

  desktopTrack.querySelectorAll('.d-step').forEach(el => {
    el.addEventListener('click', () => setActive(+el.dataset.i));
  });

  renderDesktopContent();
}

function renderDesktopContent() {
  const s = steps[activeIdx];
  desktopContent.innerHTML = `
    <div class="content-label">Objetivo</div>
    <div class="content-title">${s.title}</div>
    <div class="content-desc">${s.objective}</div>
    <div class="content-tags">${s.types.map(t => `<span class="tag">${t}</span>`).join('')}</div>
  `;
}

/* ─── MOBILE BUILD ──────────────────────────────────────────── */
const mobileTrack   = document.getElementById('mobileTrack');
const mobileContent = document.getElementById('mobileContent');
const dotsEl        = document.getElementById('carouselDots');

function buildMobile() {
  mobileTrack.innerHTML = steps.map((s, i) => `
    <div class="m-step ${i === activeIdx ? 'active' : ''}" data-i="${i}">
      <div class="step-num">${s.num}</div>
      <div class="step-icon">${s.icon}</div>
      <div class="step-title">${s.title}</div>
    </div>
  `).join('');

  dotsEl.innerHTML = steps.map((_, i) =>
    `<div class="dot ${i === activeIdx ? 'active' : ''}" data-i="${i}"></div>`
  ).join('');

  mobileTrack.querySelectorAll('.m-step').forEach(el => {
    el.addEventListener('click', () => {
      const i = +el.dataset.i;
      setActive(i);
      scrollToCard(i, true);
    });
  });

  dotsEl.querySelectorAll('.dot').forEach(el => {
    el.addEventListener('click', () => {
      const i = +el.dataset.i;
      setActive(i);
      scrollToCard(i, true);
    });
  });

  renderMobileContent(false);
  // initial scroll
  setTimeout(() => scrollToCard(activeIdx, false), 60);
}

function renderMobileContent(animate = true) {
  const s = steps[activeIdx];
  mobileContent.innerHTML = `
    <div class="mobile-content" style="${animate ? '' : 'animation:none'}">
      <div class="step-counter">
        <span class="sc-num">${s.num}</span>
        <span class="sc-sep">/</span>
        <span class="sc-total">06</span>
      </div>
      <div class="content-label">Objetivo</div>
      <div class="content-title">${s.title}</div>
      <div class="content-desc">${s.objective}</div>
      <div class="content-tags">${s.types.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `;
}

/* ─── ACTIVE STATE ──────────────────────────────────────────── */
function setActive(i) {
  activeIdx = i;

  // desktop
  desktopTrack.querySelectorAll('.d-step').forEach((el, idx) =>
    el.classList.toggle('active', idx === i));
  renderDesktopContent();

  // mobile
  mobileTrack.querySelectorAll('.m-step').forEach((el, idx) =>
    el.classList.toggle('active', idx === i));
  dotsEl.querySelectorAll('.dot').forEach((el, idx) =>
    el.classList.toggle('active', idx === i));
  renderMobileContent(true);
}

/* ─── SCROLL TO CARD ────────────────────────────────────────── */
function scrollToCard(i, smooth) {
  const cards = mobileTrack.querySelectorAll('.m-step');
  if (!cards[i]) return;
  const card   = cards[i];
  const track  = mobileTrack;
  const cardCX = card.offsetLeft + card.offsetWidth / 2;
  const trackW = track.clientWidth;
  const target = cardCX - trackW / 2;
  track.scrollTo({ left: target, behavior: smooth ? 'smooth' : 'instant' });
}

/* ─── SNAP → ACTIVE (scroll end) ───────────────────────────── */
let snapTimer;
mobileTrack.addEventListener('scroll', () => {
  clearTimeout(snapTimer);
  snapTimer = setTimeout(() => {
    const trackW  = mobileTrack.clientWidth;
    const scrollL = mobileTrack.scrollLeft;
    const cards   = mobileTrack.querySelectorAll('.m-step');
    let   best    = -1, bestDist = Infinity;
    cards.forEach((card, i) => {
      const cx   = card.offsetLeft + card.offsetWidth / 2;
      const dist = Math.abs(cx - scrollL - trackW / 2);
      if (dist < bestDist) { bestDist = dist; best = i; }
    });
    if (best !== -1 && best !== activeIdx) {
      setActive(best);
    }
  }, 80);
}, { passive: true });

/* ─── DRAG (mouse) ──────────────────────────────────────────── */
let isDragging = false, dragStart = 0, scrollStart = 0;

mobileTrack.addEventListener('mousedown', e => {
  isDragging = true;
  dragStart  = e.clientX;
  scrollStart = mobileTrack.scrollLeft;
  mobileTrack.classList.add('is-dragging');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - dragStart;
  mobileTrack.scrollLeft = scrollStart - dx;
});
window.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  mobileTrack.classList.remove('is-dragging');
});

/* ─── INIT ──────────────────────────────────────────────────── */
buildDesktop();
buildMobile();
</script>
</body>
</html>
